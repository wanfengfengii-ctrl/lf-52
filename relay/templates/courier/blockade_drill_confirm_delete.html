{% extends 'base.html' %}

{% block title %}删除推演{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> 确认删除推演
            </div>
            <div class="card-body">
                <p>确定要删除推演「{{ drill.name }}」吗？此操作不可恢复。</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'courier:blockade_drill_list' %}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
