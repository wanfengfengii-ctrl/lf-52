{% extends 'base.html' %}

{% block title %}删除封锁事件{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> 确认删除封锁事件
            </div>
            <div class="card-body">
                <p>确定要删除以下封锁事件吗？此操作不可恢复。</p>
                <table class="table table-sm">
                    <tr><th>名称</th><td>{{ event.name }}</td></tr>
                    <tr><th>类型</th><td>{{ event.get_event_type_display }}</td></tr>
                    <tr><th>时间段</th><td>{{ event.start_hour }} - {{ event.end_hour }} 时辰</td></tr>
                    <tr><th>严重程度</th><td>{{ event.severity }}</td></tr>
                </table>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'courier:blockade_event_list' %}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
